<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HelpDesk IT — Diprem</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#0a0e1a; --surface:#111827; --surface2:#1a2235; --border:#1e2d45;
    --accent:#0ea5e9; --accent2:#38bdf8; --green:#10b981;
    --orange:#f59e0b; --purple:#8b5cf6;
    --text:#e2e8f0; --text-muted:#64748b; --text-dim:#94a3b8;
    --mono:'IBM Plex Mono',monospace; --sans:'IBM Plex Sans',sans-serif;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--bg); font-family:var(--sans); color:var(--text); height:100vh; overflow:hidden; }

  /* GRID BG */
  .grid-bg {
    position:fixed; inset:0;
    background-image:linear-gradient(rgba(14,165,233,0.03) 1px,transparent 1px),
                     linear-gradient(90deg,rgba(14,165,233,0.03) 1px,transparent 1px);
    background-size:40px 40px; pointer-events:none; z-index:0;
  }

  /* ── MODO EMBEBIDO (Teams/Office) — siempre visible, ocupa todo ── */
  #chat-embed {
    display:flex; flex-direction:column;
    width:100%; height:100vh;
    background:var(--surface);
  }

  /* ── MODO STANDALONE (navegador) — botón flotante ── */
  .standalone-wrap { display:none; }

  /* Mostrar standalone solo cuando body tiene clase .standalone */
  body.standalone .standalone-wrap { display:block; }
  body.standalone #chat-embed { display:none; }
  body.standalone { overflow:auto; }
  body.standalone .grid-bg { display:block; }

  /* HERO */
  .hero {
    position:fixed; inset:0; display:flex; align-items:center; justify-content:center;
    flex-direction:column; text-align:center; z-index:0;
    background: radial-gradient(ellipse 80% 50% at 20% 20%,rgba(14,165,233,0.07) 0%,transparent 60%),
                radial-gradient(ellipse 60% 60% at 80% 80%,rgba(16,185,129,0.05) 0%,transparent 60%);
  }
  .hero-tag {
    font-family:var(--mono); font-size:11px; color:var(--accent);
    text-transform:uppercase; letter-spacing:.15em; margin-bottom:16px;
    display:flex; align-items:center; justify-content:center; gap:8px;
  }
  .hero-tag::before,.hero-tag::after { content:''; width:40px; height:1px; background:linear-gradient(90deg,transparent,var(--accent)); }
  .hero-tag::after { background:linear-gradient(90deg,var(--accent),transparent); }
  .hero h1 { font-size:42px; font-weight:300; line-height:1.1; margin-bottom:16px; }
  .hero h1 span { font-weight:600; background:linear-gradient(135deg,var(--accent),var(--green)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
  .hero p { font-size:15px; color:var(--text-muted); }

  /* LAUNCHER */
  #launcher {
    position:fixed; bottom:32px; right:32px;
    width:64px; height:64px; border-radius:50%;
    background:linear-gradient(135deg,var(--accent),#0369a1);
    border:none; cursor:pointer; display:flex; align-items:center; justify-content:center;
    box-shadow:0 8px 32px rgba(14,165,233,0.4);
    transition:all 0.3s ease; z-index:100;
    animation:pulse-ring 2.5s ease-in-out infinite;
  }
  #launcher:hover { transform:scale(1.1); }
  #launcher svg { transition:all 0.3s ease; position:absolute; }
  #launcher.open svg.chat-icon { opacity:0; transform:rotate(90deg) scale(0); }
  #launcher.open svg.close-icon { opacity:1; transform:rotate(0deg) scale(1); }
  #launcher svg.close-icon { opacity:0; transform:rotate(-90deg) scale(0); }
  @keyframes pulse-ring {
    0%,100%{box-shadow:0 8px 32px rgba(14,165,233,0.4),0 0 0 0 rgba(14,165,233,0.25);}
    50%{box-shadow:0 8px 32px rgba(14,165,233,0.4),0 0 0 12px rgba(14,165,233,0);}
  }
  .notif-dot {
    position:absolute; top:4px; right:4px; width:14px; height:14px;
    background:var(--orange); border-radius:50%; border:2px solid var(--bg);
    animation:blink 1.5s ease-in-out infinite;
  }
  @keyframes blink{0%,100%{opacity:1}50%{opacity:0.4}}

  /* CHAT FLOTANTE */
  #chat-float {
    position:fixed; bottom:110px; right:32px; width:400px; height:580px;
    background:var(--surface); border:1px solid var(--border); border-radius:20px;
    display:flex; flex-direction:column; overflow:hidden;
    box-shadow:0 24px 80px rgba(0,0,0,0.6);
    z-index:99; transform:scale(0.8) translateY(40px);
    transform-origin:bottom right; opacity:0; pointer-events:none;
    transition:all 0.35s cubic-bezier(0.34,1.56,0.64,1);
  }
  #chat-float.visible { transform:scale(1) translateY(0); opacity:1; pointer-events:all; }

  /* HEADER */
  .chat-header {
    padding:12px 14px; background:var(--surface2); border-bottom:1px solid var(--border);
    display:flex; align-items:center; gap:10px; flex-shrink:0;
  }
  .agent-avatar {
    width:34px; height:34px; border-radius:8px;
    background:linear-gradient(135deg,var(--accent),#0369a1);
    display:flex; align-items:center; justify-content:center;
    font-family:var(--mono); font-weight:600; font-size:12px; flex-shrink:0; position:relative;
  }
  .agent-avatar::after {
    content:''; position:absolute; bottom:-2px; right:-2px;
    width:9px; height:9px; background:var(--green);
    border-radius:50%; border:2px solid var(--surface2);
  }
  .agent-info { flex:1; min-width:0; }
  .agent-name { font-weight:600; font-size:12px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .agent-status { font-size:10px; color:var(--green); font-family:var(--mono); display:flex; align-items:center; gap:4px; }
  .agent-status::before { content:''; width:5px; height:5px; background:var(--green); border-radius:50%; display:inline-block; flex-shrink:0; }
  .header-badge {
    font-family:var(--mono); font-size:10px;
    background:rgba(14,165,233,0.1); border:1px solid rgba(14,165,233,0.2);
    color:var(--accent2); padding:2px 7px; border-radius:20px; flex-shrink:0;
  }

  /* MESSAGES */
  .messages {
    flex:1; overflow-y:auto; overflow-x:hidden;
    padding:12px 10px; display:flex; flex-direction:column;
    gap:8px; scroll-behavior:smooth;
  }
  .messages::-webkit-scrollbar { width:3px; }
  .messages::-webkit-scrollbar-thumb { background:var(--border); border-radius:4px; }

  .msg { max-width:92%; animation:msgIn 0.3s ease; }
  @keyframes msgIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
  .msg.bot { align-self:flex-start; }
  .msg.user { align-self:flex-end; }
  .msg-bubble { padding:8px 12px; border-radius:13px; font-size:13px; line-height:1.5; word-wrap:break-word; }
  .msg.bot .msg-bubble { background:var(--surface2); border:1px solid var(--border); border-bottom-left-radius:4px; }
  .msg.user .msg-bubble { background:linear-gradient(135deg,var(--accent),#0369a1); color:white; border-bottom-right-radius:4px; }
  .msg-time { font-size:10px; color:var(--text-muted); font-family:var(--mono); margin-top:3px; padding:0 3px; }
  .msg.user .msg-time { text-align:right; }

  /* TYPING */
  .typing-indicator {
    display:flex; align-items:center; gap:4px; padding:9px 12px;
    background:var(--surface2); border:1px solid var(--border);
    border-radius:13px; border-bottom-left-radius:4px; width:fit-content;
  }
  .typing-dot { width:5px; height:5px; background:var(--text-muted); border-radius:50%; animation:typing 1.2s ease-in-out infinite; }
  .typing-dot:nth-child(2){animation-delay:.2s}
  .typing-dot:nth-child(3){animation-delay:.4s}
  @keyframes typing{0%,60%,100%{transform:translateY(0);opacity:.4}30%{transform:translateY(-5px);opacity:1}}

  /* OPTIONS */
  .options-container { display:flex; flex-direction:column; gap:7px; margin-top:6px; }
  .opt-btn {
    display:flex; align-items:center; gap:10px; padding:11px 12px;
    background:var(--surface2); border:1px solid var(--border);
    border-radius:11px; cursor:pointer; transition:all 0.2s;
    text-align:left; width:100%; color:var(--text); font-family:var(--sans);
  }
  .opt-btn:hover { border-color:var(--accent); background:rgba(14,165,233,0.05); transform:translateX(2px); }
  .opt-btn:disabled { opacity:.5; cursor:not-allowed; transform:none; }
  .opt-icon { width:34px; height:34px; border-radius:8px; display:flex; align-items:center; justify-content:center; font-size:17px; flex-shrink:0; }
  .opt-icon.soporte { background:rgba(14,165,233,0.15); }
  .opt-icon.usuarios { background:rgba(139,92,246,0.15); }
  .opt-title { font-size:13px; font-weight:600; }
  .opt-desc { font-size:11px; color:var(--text-muted); margin-top:1px; line-height:1.3; }

  /* CONFIRM CARD */
  .confirm-card { border-radius:11px; padding:11px; margin-top:2px; }
  .confirm-card.soporte { background:rgba(14,165,233,0.06); border:1px solid rgba(14,165,233,0.2); }
  .confirm-card.usuarios { background:rgba(139,92,246,0.06); border:1px solid rgba(139,92,246,0.2); }
  .confirm-title { font-family:var(--mono); font-size:11px; margin-bottom:6px; font-weight:600; }
  .confirm-card.soporte .confirm-title { color:var(--accent2); }
  .confirm-card.usuarios .confirm-title { color:#a78bfa; }
  .confirm-card p { font-size:12px; color:var(--text-dim); line-height:1.55; }
  .open-form-btn {
    display:flex; align-items:center; justify-content:center; gap:7px;
    padding:10px 14px; border-radius:9px; border:none; cursor:pointer;
    font-family:var(--mono); font-size:12px; font-weight:600;
    width:100%; margin-top:10px; transition:all 0.2s; text-decoration:none;
  }
  .open-form-btn.soporte { background:linear-gradient(135deg,var(--accent),#0369a1); color:white; }
  .open-form-btn.usuarios { background:linear-gradient(135deg,var(--purple),#6d28d9); color:white; }
  .open-form-btn:hover { opacity:.9; transform:translateY(-1px); }
  .restart-btn {
    background:transparent; border:1px solid var(--border); color:var(--text-muted);
    border-radius:8px; padding:7px 12px; font-family:var(--mono); font-size:11px;
    cursor:pointer; width:100%; margin-top:6px; transition:all 0.2s;
  }
  .restart-btn:hover { border-color:var(--accent); color:var(--accent2); }
</style>
</head>
<body>

<div class="grid-bg"></div>

<!-- MODO EMBEBIDO (Teams / Office) -->
<div id="chat-embed">
  <div class="chat-header">
    <div class="agent-avatar">IT</div>
    <div class="agent-info">
      <div class="agent-name">HelpDesk IT — Diprem</div>
      <div class="agent-status">En línea</div>
    </div>
    <span class="header-badge">M365</span>
  </div>
  <div class="messages" id="messages-embed"></div>
</div>

<!-- MODO STANDALONE (navegador directo) -->
<div class="standalone-wrap">
  <div class="hero">
    <div>
      <div class="hero-tag">IT Support System</div>
      <h1>Soporte<br><span>Técnico</span><br>Inteligente</h1>
      <p>Contactá al equipo de IT de <strong>Diprem</strong> desde el chat.</p>
    </div>
  </div>

  <button id="launcher" onclick="toggleChat()" title="Soporte IT">
    <svg class="chat-icon" width="26" height="26" fill="none" viewBox="0 0 24 24" stroke="white" stroke-width="2">
      <path stroke-linecap="round" stroke-linejoin="round" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z"/>
    </svg>
    <svg class="close-icon" width="22" height="22" fill="none" viewBox="0 0 24 24" stroke="white" stroke-width="2">
      <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/>
    </svg>
    <span class="notif-dot"></span>
  </button>

  <div id="chat-float">
    <div class="chat-header">
      <div class="agent-avatar">IT</div>
      <div class="agent-info">
        <div class="agent-name">HelpDesk IT — Diprem</div>
        <div class="agent-status">En línea</div>
      </div>
      <span class="header-badge">M365</span>
    </div>
    <div class="messages" id="messages-float"></div>
  </div>
</div>

<script>
const FORMS = {
  soporte:  'https://forms.office.com/r/EX92vV17hy',
  usuarios: 'https://forms.office.com/r/VW0YGetJ7f'
};

// ── Detectar si estamos dentro de Teams u Office ──────────────────
function isEmbedded() {
  try {
    // Dentro de Teams/Office el user agent contiene "Teams" o "Electron"
    const ua = navigator.userAgent.toLowerCase();
    if (ua.includes('teams') || ua.includes('electron')) return true;
    // Si estamos en un iframe
    if (window.self !== window.top) return true;
    // Si la URL tiene parámetros de Teams
    if (window.location.search.includes('teamsContext')) return true;
    return false;
  } catch(e) {
    return true; // Si hay error de cross-origin, estamos en iframe
  }
}

let chatOpen = false;
let floatStarted = false;

window.addEventListener('DOMContentLoaded', () => {
  if (isEmbedded()) {
    // Modo embebido — chat directo, sin botón
    startChat('embed');
  } else {
    // Modo standalone — mostrar hero + botón flotante
    document.body.classList.add('standalone');
  }
});

function toggleChat() {
  chatOpen = !chatOpen;
  const win = document.getElementById('chat-float');
  const btn = document.getElementById('launcher');
  if (chatOpen) {
    win.classList.add('visible');
    btn.classList.add('open');
    if (!floatStarted) { floatStarted = true; startChat('float'); }
  } else {
    win.classList.remove('visible');
    btn.classList.remove('open');
  }
}

function getTime() {
  return new Date().toLocaleTimeString('es-AR', { hour:'2-digit', minute:'2-digit' });
}

function addBotMsg(mode, content, delay=0) {
  return new Promise(resolve => {
    setTimeout(() => {
      const msgs = document.getElementById('messages-' + mode);
      const typing = document.createElement('div');
      typing.className = 'msg bot';
      typing.innerHTML = `<div class="typing-indicator"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div>`;
      msgs.appendChild(typing);
      msgs.scrollTop = msgs.scrollHeight;
      setTimeout(() => {
        typing.remove();
        const d = document.createElement('div');
        d.className = 'msg bot';
        d.innerHTML = `<div class="msg-bubble">${content}</div><div class="msg-time">${getTime()}</div>`;
        msgs.appendChild(d);
        msgs.scrollTop = msgs.scrollHeight;
        resolve();
      }, 700);
    }, delay);
  });
}

function addBotWidget(mode, html, delay=0) {
  return new Promise(resolve => {
    setTimeout(() => {
      const msgs = document.getElementById('messages-' + mode);
      const typing = document.createElement('div');
      typing.className = 'msg bot';
      typing.innerHTML = `<div class="typing-indicator"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div>`;
      msgs.appendChild(typing);
      msgs.scrollTop = msgs.scrollHeight;
      setTimeout(() => {
        typing.remove();
        const d = document.createElement('div');
        d.className = 'msg bot';
        d.style.maxWidth = '98%';
        d.innerHTML = `<div class="msg-bubble" style="padding:9px">${html}</div><div class="msg-time">${getTime()}</div>`;
        msgs.appendChild(d);
        msgs.scrollTop = msgs.scrollHeight;
        resolve();
      }, 700);
    }, delay);
  });
}

function addUserMsg(mode, text) {
  const msgs = document.getElementById('messages-' + mode);
  const d = document.createElement('div');
  d.className = 'msg user';
  d.innerHTML = `<div class="msg-bubble">${text}</div><div class="msg-time">${getTime()}</div>`;
  msgs.appendChild(d);
  msgs.scrollTop = msgs.scrollHeight;
}

async function startChat(mode) {
  await addBotMsg(mode, '👋 ¡Hola! Bienvenido al <strong>HelpDesk IT de Diprem</strong>.', 0);
  await addBotMsg(mode, '¿Con qué necesitás ayuda hoy?', 500);
  await showMainMenu(mode);
}

async function showMainMenu(mode) {
  const html = `
    <div style="font-size:11px;font-family:var(--mono);color:var(--text-muted);margin-bottom:9px;">// Seleccioná una opción</div>
    <div class="options-container">
      <button class="opt-btn" onclick="selectOption('${mode}','soporte')">
        <div class="opt-icon soporte">🛠️</div>
        <div>
          <div class="opt-title">Soporte Técnico</div>
          <div class="opt-desc">Problemas con equipos, sistemas o apps M365</div>
        </div>
      </button>
      <button class="opt-btn" onclick="selectOption('${mode}','usuarios')">
        <div class="opt-icon usuarios">👤</div>
        <div>
          <div class="opt-title">Creación de Usuarios</div>
          <div class="opt-desc">Alta de cuentas, accesos y licencias M365</div>
        </div>
      </button>
    </div>
  `;
  await addBotWidget(mode, html, 300);
}

async function selectOption(mode, tipo) {
  document.querySelectorAll('.opt-btn').forEach(b => b.disabled = true);
  if (tipo === 'soporte') {
    addUserMsg(mode, '🛠️ Soporte Técnico');
    await addBotMsg(mode, 'Perfecto. Te redirigimos al formulario de <strong>Soporte Técnico</strong>.', 200);
    await addBotMsg(mode, 'Describí el problema con el mayor detalle posible. El equipo de IT se contactará a la brevedad. 🙌', 700);
    await addBotWidget(mode, `
      <div class="confirm-card soporte">
        <div class="confirm-title">🛠️  SOPORTE TÉCNICO</div>
        <p>Completá el formulario con la descripción del problema y adjuntá una captura si podés.</p>
        <a href="${FORMS.soporte}" target="_blank" class="open-form-btn soporte">
          <svg width="13" height="13" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"/></svg>
          Abrir formulario de Soporte
        </a>
        <button class="restart-btn" onclick="restartChat('${mode}')">← Volver al inicio</button>
      </div>
    `, 400);
  } else {
    addUserMsg(mode, '👤 Creación de Usuarios');
    await addBotMsg(mode, 'Perfecto. Te redirigimos al formulario de <strong>Solicitud de Usuario</strong>.', 200);
    await addBotMsg(mode, 'Ingresá los datos del nuevo usuario y el tipo de licencia requerida. El equipo lo procesará a la brevedad. 🙌', 700);
    await addBotWidget(mode, `
      <div class="confirm-card usuarios">
        <div class="confirm-title">👤  CREACIÓN DE USUARIO</div>
        <p>Completá el formulario con los datos del nuevo usuario, área y licencia M365 requerida.</p>
        <a href="${FORMS.usuarios}" target="_blank" class="open-form-btn usuarios">
          <svg width="13" height="13" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"/></svg>
          Abrir formulario de Usuario
        </a>
        <button class="restart-btn" onclick="restartChat('${mode}')">← Volver al inicio</button>
      </div>
    `, 400);
  }
}

async function restartChat(mode) {
  document.getElementById('messages-' + mode).innerHTML = '';
  await addBotMsg(mode, '¿En qué más puedo ayudarte?', 0);
  await showMainMenu(mode);
}
</script>
</body>
</html>
