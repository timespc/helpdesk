<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IT Support — HelpDesk Diprem</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0e1a; --surface: #111827; --surface2: #1a2235; --border: #1e2d45;
    --accent: #0ea5e9; --accent2: #38bdf8; --green: #10b981;
    --orange: #f59e0b; --purple: #8b5cf6;
    --text: #e2e8f0; --text-muted: #64748b; --text-dim: #94a3b8;
    --mono: 'IBM Plex Mono', monospace; --sans: 'IBM Plex Sans', sans-serif;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: var(--bg); font-family: var(--sans); color: var(--text);
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
    overflow: hidden; position: relative;
  }
  body::before {
    content:''; position:fixed; inset:0;
    background: radial-gradient(ellipse 80% 50% at 20% 20%, rgba(14,165,233,0.07) 0%, transparent 60%),
                radial-gradient(ellipse 60% 60% at 80% 80%, rgba(16,185,129,0.05) 0%, transparent 60%);
    pointer-events:none;
  }
  .grid-bg {
    position:fixed; inset:0;
    background-image: linear-gradient(rgba(14,165,233,0.03) 1px,transparent 1px),
                      linear-gradient(90deg,rgba(14,165,233,0.03) 1px,transparent 1px);
    background-size:40px 40px; pointer-events:none;
  }

  /* LAUNCHER */
  #launcher {
    position:fixed; bottom:32px; right:32px;
    width:64px; height:64px; border-radius:50%;
    background:linear-gradient(135deg,var(--accent),#0369a1);
    border:none; cursor:pointer; display:flex; align-items:center; justify-content:center;
    box-shadow:0 8px 32px rgba(14,165,233,0.4);
    transition:all 0.3s ease; z-index:100;
    animation:pulse-ring 2.5s ease-in-out infinite;
  }
  #launcher:hover { transform:scale(1.1); }
  #launcher svg { transition:all 0.3s ease; position:absolute; }
  #launcher.open svg.chat-icon { opacity:0; transform:rotate(90deg) scale(0); }
  #launcher.open svg.close-icon { opacity:1; transform:rotate(0deg) scale(1); }
  #launcher svg.close-icon { opacity:0; transform:rotate(-90deg) scale(0); }
  @keyframes pulse-ring {
    0%,100% { box-shadow:0 8px 32px rgba(14,165,233,0.4),0 0 0 0 rgba(14,165,233,0.25); }
    50% { box-shadow:0 8px 32px rgba(14,165,233,0.4),0 0 0 12px rgba(14,165,233,0); }
  }
  .notif-dot {
    position:absolute; top:4px; right:4px;
    width:14px; height:14px; background:var(--orange);
    border-radius:50%; border:2px solid var(--bg);
    animation:blink 1.5s ease-in-out infinite;
  }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.4} }

  /* CHAT WINDOW */
  #chat-window {
    position:fixed; bottom:110px; right:32px;
    width:400px; height:580px;
    background:var(--surface); border:1px solid var(--border); border-radius:20px;
    display:flex; flex-direction:column; overflow:hidden;
    box-shadow:0 24px 80px rgba(0,0,0,0.6),0 0 0 1px rgba(14,165,233,0.1);
    z-index:99; transform:scale(0.8) translateY(40px);
    transform-origin:bottom right; opacity:0; pointer-events:none;
    transition:all 0.35s cubic-bezier(0.34,1.56,0.64,1);
  }
  #chat-window.visible { transform:scale(1) translateY(0); opacity:1; pointer-events:all; }

  /* HEADER */
  .chat-header {
    padding:14px 18px; background:var(--surface2); border-bottom:1px solid var(--border);
    display:flex; align-items:center; gap:12px; flex-shrink:0;
  }
  .agent-avatar {
    width:38px; height:38px; border-radius:10px;
    background:linear-gradient(135deg,var(--accent),#0369a1);
    display:flex; align-items:center; justify-content:center;
    font-family:var(--mono); font-weight:600; font-size:13px;
    flex-shrink:0; position:relative;
  }
  .agent-avatar::after {
    content:''; position:absolute; bottom:-2px; right:-2px;
    width:10px; height:10px; background:var(--green);
    border-radius:50%; border:2px solid var(--surface2);
  }
  .agent-info { flex:1; }
  .agent-name { font-weight:600; font-size:13px; }
  .agent-status {
    font-size:11px; color:var(--green); font-family:var(--mono);
    display:flex; align-items:center; gap:4px;
  }
  .agent-status::before { content:''; width:5px; height:5px; background:var(--green); border-radius:50%; display:inline-block; }
  .header-badge {
    font-family:var(--mono); font-size:10px;
    background:rgba(14,165,233,0.1); border:1px solid rgba(14,165,233,0.2);
    color:var(--accent2); padding:3px 8px; border-radius:20px;
  }

  /* MESSAGES */
  .messages {
    flex:1; overflow-y:auto; padding:16px 14px;
    display:flex; flex-direction:column; gap:10px; scroll-behavior:smooth;
  }
  .messages::-webkit-scrollbar { width:3px; }
  .messages::-webkit-scrollbar-thumb { background:var(--border); border-radius:4px; }

  .msg { max-width:88%; animation:msgIn 0.3s ease; }
  @keyframes msgIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
  .msg.bot { align-self:flex-start; }
  .msg.user { align-self:flex-end; }
  .msg-bubble { padding:9px 13px; border-radius:14px; font-size:13px; line-height:1.55; }
  .msg.bot .msg-bubble { background:var(--surface2); border:1px solid var(--border); border-bottom-left-radius:4px; }
  .msg.user .msg-bubble { background:linear-gradient(135deg,var(--accent),#0369a1); color:white; border-bottom-right-radius:4px; }
  .msg-time { font-size:10px; color:var(--text-muted); font-family:var(--mono); margin-top:3px; padding:0 4px; }
  .msg.user .msg-time { text-align:right; }

  /* TYPING */
  .typing-indicator {
    display:flex; align-items:center; gap:4px; padding:10px 13px;
    background:var(--surface2); border:1px solid var(--border);
    border-radius:14px; border-bottom-left-radius:4px; width:fit-content;
  }
  .typing-dot { width:5px; height:5px; background:var(--text-muted); border-radius:50%; animation:typing 1.2s ease-in-out infinite; }
  .typing-dot:nth-child(2) { animation-delay:0.2s; }
  .typing-dot:nth-child(3) { animation-delay:0.4s; }
  @keyframes typing { 0%,60%,100%{transform:translateY(0);opacity:0.4} 30%{transform:translateY(-5px);opacity:1} }

  /* OPTION BUTTONS */
  .options-container { display:flex; flex-direction:column; gap:8px; margin-top:6px; }
  .opt-btn {
    display:flex; align-items:center; gap:12px; padding:12px 14px;
    background:var(--surface2); border:1px solid var(--border);
    border-radius:12px; cursor:pointer; transition:all 0.2s;
    text-align:left; width:100%; color:var(--text); font-family:var(--sans);
  }
  .opt-btn:hover { border-color:var(--accent); background:rgba(14,165,233,0.05); transform:translateX(3px); }
  .opt-btn:disabled { opacity:0.5; cursor:not-allowed; transform:none; }
  .opt-icon { width:36px; height:36px; border-radius:8px; display:flex; align-items:center; justify-content:center; font-size:18px; flex-shrink:0; }
  .opt-icon.soporte { background:rgba(14,165,233,0.15); }
  .opt-icon.usuarios { background:rgba(139,92,246,0.15); }
  .opt-title { font-size:13px; font-weight:600; }
  .opt-desc { font-size:11px; color:var(--text-muted); margin-top:1px; }

  /* CONFIRM CARD */
  .confirm-card { border-radius:12px; padding:12px; margin-top:2px; }
  .confirm-card.soporte { background:rgba(14,165,233,0.06); border:1px solid rgba(14,165,233,0.2); }
  .confirm-card.usuarios { background:rgba(139,92,246,0.06); border:1px solid rgba(139,92,246,0.2); }
  .confirm-title { font-family:var(--mono); font-size:11px; margin-bottom:6px; font-weight:600; }
  .confirm-card.soporte .confirm-title { color:var(--accent2); }
  .confirm-card.usuarios .confirm-title { color:#a78bfa; }
  .confirm-card p { font-size:12px; color:var(--text-dim); line-height:1.6; }

  /* FORM BUTTON */
  .open-form-btn {
    display:flex; align-items:center; justify-content:center; gap:8px;
    padding:11px 16px; border-radius:10px; border:none; cursor:pointer;
    font-family:var(--mono); font-size:12px; font-weight:600;
    width:100%; margin-top:10px; transition:all 0.2s; text-decoration:none;
  }
  .open-form-btn.soporte { background:linear-gradient(135deg,var(--accent),#0369a1); color:white; }
  .open-form-btn.usuarios { background:linear-gradient(135deg,var(--purple),#6d28d9); color:white; }
  .open-form-btn:hover { opacity:0.9; transform:translateY(-1px); }

  .restart-btn {
    background:transparent; border:1px solid var(--border); color:var(--text-muted);
    border-radius:8px; padding:7px 12px; font-family:var(--mono); font-size:11px;
    cursor:pointer; width:100%; margin-top:6px; transition:all 0.2s;
  }
  .restart-btn:hover { border-color:var(--accent); color:var(--accent2); }

  /* HERO */
  .hero { text-align:center; max-width:440px; padding:20px; z-index:1; }
  .hero-tag {
    font-family:var(--mono); font-size:11px; color:var(--accent);
    text-transform:uppercase; letter-spacing:0.15em; margin-bottom:16px;
    display:flex; align-items:center; justify-content:center; gap:8px;
  }
  .hero-tag::before,.hero-tag::after { content:''; width:40px; height:1px; background:linear-gradient(90deg,transparent,var(--accent)); }
  .hero-tag::after { background:linear-gradient(90deg,var(--accent),transparent); }
  .hero h1 { font-size:42px; font-weight:300; line-height:1.1; margin-bottom:16px; letter-spacing:-0.02em; }
  .hero h1 span { font-weight:600; background:linear-gradient(135deg,var(--accent),var(--green)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
  .hero p { font-size:15px; color:var(--text-muted); line-height:1.7; }

  @media(max-width:480px) {
    #chat-window { width:100%; right:0; bottom:80px; border-radius:20px 20px 0 0; height:72vh; }
    #launcher { bottom:20px; right:20px; }
  }
</style>
</head>
<body>
<div class="grid-bg"></div>

<div class="hero">
  <div class="hero-tag">IT Support System</div>
  <h1>Soporte<br><span>Técnico</span><br>Inteligente</h1>
  <p>Contactá al equipo de IT de <strong>Diprem</strong> desde el chat.</p>
</div>

<button id="launcher" onclick="toggleChat()" title="Soporte IT">
  <svg class="chat-icon" width="26" height="26" fill="none" viewBox="0 0 24 24" stroke="white" stroke-width="2">
    <path stroke-linecap="round" stroke-linejoin="round" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z"/>
  </svg>
  <svg class="close-icon" width="22" height="22" fill="none" viewBox="0 0 24 24" stroke="white" stroke-width="2">
    <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/>
  </svg>
  <span class="notif-dot" id="notif-dot"></span>
</button>

<div id="chat-window">
  <div class="chat-header">
    <div class="agent-avatar">IT</div>
    <div class="agent-info">
      <div class="agent-name">HelpDesk IT — Diprem</div>
      <div class="agent-status">En línea</div>
    </div>
    <span class="header-badge">M365</span>
  </div>
  <div class="messages" id="messages"></div>
</div>

<script>
const FORMS = {
  soporte:  'https://forms.office.com/r/EX92vV17hy',
  usuarios: 'https://forms.office.com/r/VW0YGetJ7f'
};

let chatOpen = false;
let started  = false;

function toggleChat() {
  chatOpen = !chatOpen;
  const win = document.getElementById('chat-window');
  const btn = document.getElementById('launcher');
  const dot = document.getElementById('notif-dot');
  if (chatOpen) {
    win.classList.add('visible');
    btn.classList.add('open');
    dot.style.display = 'none';
    if (!started) { started = true; startConversation(); }
  } else {
    win.classList.remove('visible');
    btn.classList.remove('open');
  }
}

function getTime() {
  return new Date().toLocaleTimeString('es-AR', { hour:'2-digit', minute:'2-digit' });
}

function addBotMsg(content, delay=0) {
  return new Promise(resolve => {
    setTimeout(() => {
      const msgs = document.getElementById('messages');
      const typing = document.createElement('div');
      typing.className = 'msg bot';
      typing.innerHTML = `<div class="typing-indicator"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div>`;
      msgs.appendChild(typing);
      msgs.scrollTop = msgs.scrollHeight;
      setTimeout(() => {
        typing.remove();
        const d = document.createElement('div');
        d.className = 'msg bot';
        d.innerHTML = `<div class="msg-bubble">${content}</div><div class="msg-time">${getTime()}</div>`;
        msgs.appendChild(d);
        msgs.scrollTop = msgs.scrollHeight;
        resolve();
      }, 800);
    }, delay);
  });
}

function addBotWidget(html, delay=0) {
  return new Promise(resolve => {
    setTimeout(() => {
      const msgs = document.getElementById('messages');
      const typing = document.createElement('div');
      typing.className = 'msg bot';
      typing.innerHTML = `<div class="typing-indicator"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div>`;
      msgs.appendChild(typing);
      msgs.scrollTop = msgs.scrollHeight;
      setTimeout(() => {
        typing.remove();
        const d = document.createElement('div');
        d.className = 'msg bot';
        d.style.maxWidth = '96%';
        d.innerHTML = `<div class="msg-bubble" style="padding:10px">${html}</div><div class="msg-time">${getTime()}</div>`;
        msgs.appendChild(d);
        msgs.scrollTop = msgs.scrollHeight;
        resolve();
      }, 800);
    }, delay);
  });
}

function addUserMsg(text) {
  const msgs = document.getElementById('messages');
  const d = document.createElement('div');
  d.className = 'msg user';
  d.innerHTML = `<div class="msg-bubble">${text}</div><div class="msg-time">${getTime()}</div>`;
  msgs.appendChild(d);
  msgs.scrollTop = msgs.scrollHeight;
}

async function startConversation() {
  await addBotMsg('👋 ¡Hola! Bienvenido al <strong>HelpDesk IT de Diprem</strong>.', 0);
  await addBotMsg('¿Con qué necesitás ayuda hoy?', 500);
  await showMainMenu();
}

async function showMainMenu() {
  const html = `
    <div style="font-size:11px;font-family:var(--mono);color:var(--text-muted);margin-bottom:10px;">// Seleccioná una opción</div>
    <div class="options-container">
      <button class="opt-btn" onclick="selectOption('soporte')">
        <div class="opt-icon soporte">🛠️</div>
        <div>
          <div class="opt-title">Soporte Técnico</div>
          <div class="opt-desc">Problemas con equipos, sistemas o aplicaciones M365</div>
        </div>
      </button>
      <button class="opt-btn" onclick="selectOption('usuarios')">
        <div class="opt-icon usuarios">👤</div>
        <div>
          <div class="opt-title">Creación de Usuarios</div>
          <div class="opt-desc">Alta de cuentas, accesos y licencias M365</div>
        </div>
      </button>
    </div>
  `;
  await addBotWidget(html, 300);
}

async function selectOption(tipo) {
  document.querySelectorAll('.opt-btn').forEach(b => b.disabled = true);

  if (tipo === 'soporte') {
    addUserMsg('🛠️ Soporte Técnico');
    await addBotMsg('Perfecto. Te voy a redirigir al formulario de <strong>Soporte Técnico</strong>.', 200);
    await addBotMsg('Describí tu problema con el mayor detalle posible y adjuntá una captura si podés. Un técnico se pondrá en contacto a la brevedad. 🙌', 700);
    await addBotWidget(`
      <div class="confirm-card soporte">
        <div class="confirm-title">🛠️  SOPORTE TÉCNICO</div>
        <p>Completá el formulario con la descripción del problema. El equipo de IT responderá a tu consulta lo antes posible.</p>
        <a href="${FORMS.soporte}" target="_blank" class="open-form-btn soporte">
          <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"/>
          </svg>
          Abrir formulario de Soporte
        </a>
        <button class="restart-btn" onclick="restartChat()">← Volver al inicio</button>
      </div>
    `, 400);

  } else {
    addUserMsg('👤 Creación de Usuarios');
    await addBotMsg('Perfecto. Te voy a redirigir al formulario de <strong>Solicitud de Cuenta/Usuario</strong>.', 200);
    await addBotMsg('Ingresá los datos del nuevo usuario, el área y el tipo de licencia M365 requerida. El equipo procesará la solicitud a la brevedad. 🙌', 700);
    await addBotWidget(`
      <div class="confirm-card usuarios">
        <div class="confirm-title">👤  CREACIÓN DE USUARIO</div>
        <p>Completá el formulario con los datos del nuevo usuario. El equipo de IT procesará la solicitud y te notificará cuando esté lista.</p>
        <a href="${FORMS.usuarios}" target="_blank" class="open-form-btn usuarios">
          <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"/>
          </svg>
          Abrir formulario de Usuario
        </a>
        <button class="restart-btn" onclick="restartChat()">← Volver al inicio</button>
      </div>
    `, 400);
  }
}

async function restartChat() {
  const msgs = document.getElementById('messages');
  msgs.innerHTML = '';
  await addBotMsg('¿En qué más puedo ayudarte?', 0);
  await showMainMenu();
}
</script>
</body>
</html>
