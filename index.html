<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>HelpDesk IT — Diprem</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#0a0e1a; --surface:#111827; --surface2:#1a2235; --border:#1e2d45;
    --accent:#0ea5e9; --accent2:#38bdf8; --green:#10b981;
    --orange:#f59e0b; --purple:#8b5cf6;
    --text:#e2e8f0; --text-muted:#64748b; --text-dim:#94a3b8;
    --mono:'IBM Plex Mono',monospace; --sans:'IBM Plex Sans',sans-serif;
  }
  
  /* Ajuste Global para evitar desbordes */
  * { 
    margin:0; 
    padding:0; 
    box-sizing:border-box; 
  }

  body { 
    background:var(--bg); 
    font-family:var(--sans); 
    color:var(--text); 
    height:100vh; 
    overflow:hidden; 
    width: 100%;
  }

  /* GRID BG */
  .grid-bg {
    position:fixed; inset:0;
    background-image:linear-gradient(rgba(14,165,233,0.03) 1px,transparent 1px),
                     linear-gradient(90deg,rgba(14,165,233,0.03) 1px,transparent 1px);
    background-size:40px 40px; pointer-events:none; z-index:0;
  }

  /* MODO EMBEBIDO (Teams/Office) */
  #chat-embed {
    display:flex; flex-direction:column;
    width:100%; height:100vh;
    background:var(--surface);
    position: relative;
    z-index: 1;
  }

  /* MODO STANDALONE */
  .standalone-wrap { display:none; }
  body.standalone .standalone-wrap { display:block; }
  body.standalone #chat-embed { display:none; }
  body.standalone { overflow:auto; }

  /* HERO */
  .hero {
    position:fixed; inset:0; display:flex; align-items:center; justify-content:center;
    flex-direction:column; text-align:center; z-index:0;
    padding: 20px;
    background: radial-gradient(ellipse 80% 50% at 20% 20%,rgba(14,165,233,0.07) 0%,transparent 60%),
                radial-gradient(ellipse 60% 60% at 80% 80%,rgba(16,185,129,0.05) 0%,transparent 60%);
  }
  .hero h1 { font-size:clamp(24px, 8vw, 42px); font-weight:300; line-height:1.1; margin-bottom:16px; }
  .hero h1 span { font-weight:600; background:linear-gradient(135deg,var(--accent),var(--green)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }

  /* BOTONES Y OPCIONES OPTIMIZADOS */
  .options-container { 
    display:flex; 
    flex-direction:column; 
    gap:8px; 
    margin-top:6px;
    width: 100%;
  }

  .opt-btn {
    display:flex; 
    align-items:center; 
    gap:10px; 
    padding:12px;
    background:var(--surface2); 
    border:1px solid var(--border);
    border-radius:11px; 
    cursor:pointer; 
    transition:all 0.2s;
    text-align:left; 
    width:100%; 
    max-width: 100%;
    color:var(--text); 
    overflow: hidden;
  }

  .opt-btn:hover { border-color:var(--accent); background:rgba(14,165,233,0.05); }

  .chat-header {
    padding:12px 14px; background:var(--surface2); border-bottom:1px solid var(--border);
    display:flex; align-items:center; gap:10px; flex-shrink:0;
  }

  .messages {
    flex:1; overflow-y:auto; overflow-x:hidden;
    padding:12px 10px; display:flex; flex-direction:column;
    gap:10px; scroll-behavior:smooth;
  }

  .msg-bubble { padding:10px 14px; border-radius:13px; font-size:13.5px; line-height:1.4; word-wrap:break-word; }

  /* LAUNCHER Y FLOAT (Standalone) */
  #launcher {
    position:fixed; bottom:20px; right:20px;
    width:60px; height:60px; border-radius:50%;
    background:linear-gradient(135deg,var(--accent),#0369a1);
    border:none; cursor:pointer; display:flex; align-items:center; justify-content:center;
    box-shadow:0 8px 32px rgba(14,165,233,0.4); z-index:100;
  }

  #chat-float {
    position:fixed; bottom:90px; right:20px; width:calc(100% - 40px); max-width:400px; height:70vh;
    background:var(--surface); border:1px solid var(--border); border-radius:20px;
    display:flex; flex-direction:column; overflow:hidden;
    box-shadow:0 24px 80px rgba(0,0,0,0.6); z-index:99; opacity:0; pointer-events:none;
    transition:all 0.3s cubic-bezier(0.34,1.56,0.64,1);
  }
  #chat-float.visible { opacity:1; pointer-events:all; transform: translateY(-10px); }

  .open-form-btn {
    display:flex; align-items:center; justify-content:center; gap:7px;
    padding:12px; border-radius:9px; border:none; cursor:pointer;
    font-family:var(--mono); font-size:12px; font-weight:600;
    width:100%; margin-top:10px; text-decoration:none;
  }
</style>
</head>
<body>

<div class="grid-bg"></div>

<div id="chat-embed">
  <div class="chat-header">
    <div style="width:34px; height:34px; border-radius:8px; background:var(--accent); display:flex; align-items:center; justify-content:center; font-weight:bold;">IT</div>
    <div style="flex:1; margin-left:10px;">
      <div style="font-weight:600; font-size:12px;">HelpDesk IT — Diprem</div>
      <div style="font-size:10px; color:var(--green);">● En línea</div>
    </div>
  </div>
  <div class="messages" id="messages-embed"></div>
</div>

<div class="standalone-wrap">
  <div class="hero">
    <div class="hero-tag">IT Support System</div>
    <h1>Soporte<br><span>Técnico</span></h1>
    <p>Diprem IT Support</p>
  </div>

  <button id="launcher" onclick="toggleChat()">
    <svg width="26" height="26" fill="none" viewBox="0 0 24 24" stroke="white" stroke-width="2"><path d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z"/></svg>
  </button>

  <div id="chat-float">
    <div class="chat-header">
       <div style="font-weight:600; font-size:12px;">HelpDesk IT — Diprem</div>
    </div>
    <div class="messages" id="messages-float"></div>
  </div>
</div>

<script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
<script>
const FORMS = {
  soporte:  'https://forms.office.com/r/EX92vV17hy',
  usuarios: 'https://forms.office.com/r/VW0YGetJ7f'
};

Office.onReady((info) => {
    // Si estamos en Office, forzamos el modo embebido
    if (info.host) {
        document.body.classList.remove('standalone');
        startChat('embed');
    }
});

function isEmbedded() {
  if (window.self !== window.top) return true;
  const ua = navigator.userAgent.toLowerCase();
  return ua.includes('teams') || ua.includes('electron');
}

window.addEventListener('DOMContentLoaded', () => {
  if (!isEmbedded() && !window.location.search.includes('office')) {
    document.body.classList.add('standalone');
  } else {
    startChat('embed');
  }
});

let chatOpen = false;
let floatStarted = false;

function toggleChat() {
  chatOpen = !chatOpen;
  document.getElementById('chat-float').classList.toggle('visible', chatOpen);
  if (chatOpen && !floatStarted) { floatStarted = true; startChat('float'); }
}

function getTime() { return new Date().toLocaleTimeString('es-AR', { hour:'2-digit', minute:'2-digit' }); }

async function addBotMsg(mode, content, delay=500) {
  const msgs = document.getElementById('messages-' + mode);
  const d = document.createElement('div');
  d.className = 'msg bot';
  d.style.marginBottom = '8px';
  d.innerHTML = `<div class="msg-bubble" style="background:var(--surface2); border:1px solid var(--border);">${content}</div><div style="font-size:9px; color:var(--text-muted); margin-top:4px;">${getTime()}</div>`;
  msgs.appendChild(d);
  msgs.scrollTop = msgs.scrollHeight;
}

async function addBotWidget(mode, html) {
  const msgs = document.getElementById('messages-' + mode);
  const d = document.createElement('div');
  d.style.width = '100%';
  d.innerHTML = html;
  msgs.appendChild(d);
  msgs.scrollTop = msgs.scrollHeight;
}

function addUserMsg(mode, text) {
  const msgs = document.getElementById('messages-' + mode);
  const d = document.createElement('div');
  d.style.alignSelf = 'flex-end';
  d.style.marginBottom = '8px';
  d.innerHTML = `<div class="msg-bubble" style="background:var(--accent); color:white;">${text}</div>`;
  msgs.appendChild(d);
  msgs.scrollTop = msgs.scrollHeight;
}

async function startChat(mode) {
  const msgs = document.getElementById('messages-' + mode);
  if(msgs.children.length > 0) return;
  await addBotMsg(mode, '👋 ¡Hola! Bienvenido al <strong>HelpDesk IT de Diprem</strong>.');
  await showMainMenu(mode);
}

async function showMainMenu(mode) {
  const html = `
    <div class="options-container">
      <button class="opt-btn" onclick="selectOption('${mode}','soporte')">
        <span style="font-size:20px;">🛠️</span>
        <div><div style="font-weight:600; font-size:13px;">Soporte Técnico</div><div style="font-size:11px; color:var(--text-muted);">Equipos y Apps M365</div></div>
      </button>
      <button class="opt-btn" onclick="selectOption('${mode}','usuarios')">
        <span style="font-size:20px;">👤</span>
        <div><div style="font-weight:600; font-size:13px;">Creación de Usuarios</div><div style="font-size:11px; color:var(--text-muted);">Altas y Licencias</div></div>
      </button>
    </div>
  `;
  await addBotWidget(mode, html);
}

async function selectOption(mode, tipo) {
  addUserMsg(mode, tipo === 'soporte' ? '🛠️ Soporte Técnico' : '👤 Creación de Usuarios');
  const url = tipo === 'soporte' ? FORMS.soporte : FORMS.usuarios;
  const color = tipo === 'soporte' ? 'var(--accent)' : 'var(--purple)';
  
  await addBotMsg(mode, `Iniciando solicitud de <strong>${tipo}</strong>...`);
  await addBotWidget(mode, `
    <div style="background:var(--surface2); padding:12px; border-radius:12px; border:1px solid var(--border); margin-top:5px;">
      <p style="font-size:12px; margin-bottom:10px;">Por favor, completá el formulario oficial de Diprem:</p>
      <a href="${url}" target="_blank" class="open-form-btn" style="background:${color}; color:white;">Abrir Formulario</a>
      <button onclick="restartChat('${mode}')" style="background:transparent; border:none; color:var(--accent); font-size:11px; margin-top:10px; cursor:pointer;">← Volver al inicio</button>
    </div>
  `);
}

function restartChat(mode) {
  document.getElementById('messages-' + mode).innerHTML = '';
  startChat(mode);
}
</script>
</body>
</html>
